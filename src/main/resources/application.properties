spring.application.name=milestonebackend

# ===============================
# SERVER
# ===============================

server.port=${PORT:8080}

# ===============================
# DATABASE (Supabase / PostgreSQL)
# ===============================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# HikariCP connection pool (Render-friendly)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.initialization-fail-timeout=-1

# Force IPv4 (Render free tier doesn't support IPv6)
spring.datasource.hikari.data-source-properties.socketFactory=org.postgresql.ssl.NonValidatingFactory
spring.datasource.hikari.data-source-properties.assumeMinServerVersion=13

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
# Hibernate auto-detects dialect — no need to specify explicitly

# ===============================
# JWT
# ===============================

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# NONCE
# ===============================

auth.nonce.expiry-seconds=${NONCE_EXPIRY_SECONDS:300}

# ===============================
# JPA / DEBUG
# ===============================

spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# ===============================
# ACTUATOR
# ===============================

management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info}
management.endpoint.health.show-details=${ACTUATOR_HEALTH_DETAILS:always}

# ===============================
# SWAGGER / SPRINGDOC
# ===============================

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===============================
# AI VALIDATOR SERVICE
# ===============================

ai.validator.base-url=${AI_VALIDATOR_BASE_URL}
ai.validator.generate-milestones-path=${AI_GENERATE_MILESTONES_PATH:/api/v1/ai/generate-milestones}
ai.validator.evaluate-path=${AI_EVALUATE_PATH:/api/v1/ai/evaluate}

# ===============================
# BLOCKCHAIN SERVICE
# ===============================

blockchain.base-url=${BLOCKCHAIN_BASE_URL}
blockchain.deploy-contract-path=${BLOCKCHAIN_DEPLOY_CONTRACT_PATH:/api/v1/blockchain/deploy-contract}
blockchain.get-app-id-path=${BLOCKCHAIN_GET_APP_ID_PATH:/api/v1/blockchain/get-app-id}
blockchain.fund-project-path=${BLOCKCHAIN_FUND_PROJECT_PATH:/api/v1/blockchain/fund-project}
blockchain.release-milestone-path=${BLOCKCHAIN_RELEASE_MILESTONE_PATH:/api/v1/blockchain/release-milestone}